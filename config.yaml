audio:
  whisper_path: /home/daveealex/ai-companion/whisper-cli
  whisper_model: tiny
  whisper_threads: 6
  whisper_sample_rate: 16000
  piper_path: /usr/local/bin/piper
  piper_voice: en_US-amy-low
  piper_espeak_data: /home/daveealex/piper/espeak-ng-data
  piper_model_path: /home/daveealex/ai-companion/voice/redqueen_v4.onnx
  piper_length_scale: 1.0
  piper_noise_scale: 0.667
  piper_noise_w: 0.8
  vad_threshold: 0.35
  vad_speech_threshold: 0.3
  vad_min_speech_ms: 300
  vad_min_silence_ms: 800
  vad_buffer_ms: 500
  sample_rate: 16000
  channels: 1
  mic_device: 2
  wake_word: red queen
  recording_duration: 5000
llm:
  provider: hermes
  hermes_api_url: http://192.168.1.109:13305/v1
  hermes_model: Holo-3.1-4B-Q6_K-GGUF-Q6_K
  external_url: http://192.168.1.134:13305/v1
  external_model: Qwen2.5-Coder-7B-Instruct-128K-Q4_K_M
  external_enabled: false
  max_tokens: 500
  temperature: 0.7
  top_p: 0.9
  system_prompt_file: assets/system_prompt.md
  max_conversation_turns: 20
  auto_clear: true
safety:
  enabled: true
  default_mode: child
  use_face_recognition: false
  use_voice_classifier: true
  voice:
    adult_min_f0: 75
    child_max_f0: 225
    ambiguous_range: 20
    min_samples: 30
  face:
    known_adults:
    - name: David
      enrollment_file: safety/enrollments/david.npy
    known_children:
    - name: Isabella
      enrollment_file: safety/enrollments/isabella.npy
    - name: Samuele
      enrollment_file: safety/enrollments/samuele.npy
    face_tolerance: 0.6
camera:
  enabled: false
  type: usb
  resolution: 1280x720
  stream_url: http://localhost:5000/cam/stream
  snapshot_url: http://localhost:5000/cam/snapshot
  capture_format: jpeg
  vision_prompt: Describe what you see in this image in one short sentence.
face:
  window_width: 400
  window_height: 300
  window_title: Red Queen
  refresh_rate: 30
  eye_color: (255, 0, 51)
  pupil_color: (0, 0, 0)
  eye_size: 40
  pupil_size: 15
  eye_spacing: 120
  mouth_color: (255, 0, 51)
  mouth_width: 80
  mouth_height: 20
  blink_interval_min: 2
  blink_interval_max: 6
  blink_duration: 150
  bg_color: (10, 10, 15)
ha:
  enabled: true
  url: http://localhost:8123
  token: eyJhbG...MAsE
  watch_entities:
  - sensor.temperature
  - binary_sensor.motion
  - light.living_room
  ha_commands:
  - pattern: turn on (?:the )?(.*)
    action: turn_on
  - pattern: turn off (?:the )?(.*)
    action: turn_off
  - pattern: what is (?:the )?(.*)
    action: check_state
  - pattern: how (?:is|are) (?:the )?(.*)
    action: check_state
web:
  server_url: http://localhost:5000
  kiosk_browser: chromium-browser
system:
  hostname: ai-companion
  auto_start: true
  log_level: INFO
  log_file: logs/companion.log
  command_port: 9999
  gpio:
    enabled: false
    motion_pin: 17
    distance_trig: 27
    distance_echo: 22
    rgb_red: 12
    rgb_green: 16
    rgb_blue: 20
